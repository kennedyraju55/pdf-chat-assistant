<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="30" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="bold">System Architecture</text>

  <!-- PDF Input -->
  <rect x="30" y="60" width="140" height="60" rx="10" fill="#1e293b" stroke="#e94560" stroke-width="2"/>
  <text x="100" y="85" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">📄 PDF Files</text>
  <text x="100" y="105" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Single or Multiple</text>

  <!-- Arrow -->
  <line x1="170" y1="90" x2="210" y2="90" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/></marker></defs>

  <!-- Text Extraction -->
  <rect x="215" y="60" width="140" height="60" rx="10" fill="#1e293b" stroke="#e94560" stroke-width="2"/>
  <text x="285" y="82" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📋 Text Extraction</text>
  <text x="285" y="100" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">extract_text_from_pdf()</text>
  <text x="285" y="113" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">PyPDF2 Parser</text>

  <!-- Arrow -->
  <line x1="355" y1="90" x2="395" y2="90" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Chunking -->
  <rect x="400" y="60" width="140" height="60" rx="10" fill="#1e293b" stroke="#e94560" stroke-width="2"/>
  <text x="470" y="82" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">✂️ Text Chunking</text>
  <text x="470" y="100" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">chunk_text()</text>
  <text x="470" y="113" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">2000 chars / 200 overlap</text>

  <!-- Arrow down -->
  <line x1="470" y1="120" x2="470" y2="160" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- User Question -->
  <rect x="30" y="170" width="140" height="60" rx="10" fill="#1e293b" stroke="#533483" stroke-width="2"/>
  <text x="100" y="195" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">💬 User Question</text>
  <text x="100" y="215" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">CLI or Web UI</text>

  <!-- Arrow -->
  <line x1="170" y1="200" x2="210" y2="200" stroke="#533483" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs><marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#533483"/></marker></defs>

  <!-- Retrieval -->
  <rect x="215" y="170" width="140" height="60" rx="10" fill="#1e293b" stroke="#533483" stroke-width="2"/>
  <text x="285" y="192" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🔍 Chunk Retrieval</text>
  <text x="285" y="210" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">find_relevant_chunks()</text>
  <text x="285" y="223" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Top-K keyword match</text>

  <!-- Arrow -->
  <line x1="355" y1="200" x2="395" y2="200" stroke="#533483" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Context Builder -->
  <rect x="400" y="170" width="140" height="60" rx="10" fill="#1e293b" stroke="#533483" stroke-width="2"/>
  <text x="470" y="192" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📦 Context Builder</text>
  <text x="470" y="210" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Chunks + History</text>
  <text x="470" y="223" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Prompt Assembly</text>

  <!-- Arrow -->
  <line x1="540" y1="200" x2="580" y2="200" stroke="#533483" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- LLM -->
  <rect x="585" y="155" width="180" height="90" rx="10" fill="#2d1b69" stroke="#e94560" stroke-width="2"/>
  <text x="675" y="185" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">🤖 Gemma 4 LLM</text>
  <text x="675" y="205" text-anchor="middle" fill="#c4b5fd" font-family="Segoe UI,Arial,sans-serif" font-size="11">ask_question()</text>
  <text x="675" y="225" text-anchor="middle" fill="#c4b5fd" font-family="Segoe UI,Arial,sans-serif" font-size="11">via Ollama API</text>

  <!-- Arrow down from LLM -->
  <line x1="675" y1="245" x2="675" y2="285" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Response -->
  <rect x="585" y="290" width="180" height="60" rx="10" fill="#1e293b" stroke="#e94560" stroke-width="2"/>
  <text x="675" y="315" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">💡 AI Response</text>
  <text x="675" y="335" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Contextual Answer</text>

  <!-- Export -->
  <rect x="30" y="290" width="140" height="60" rx="10" fill="#1e293b" stroke="#e94560" stroke-width="2"/>
  <text x="100" y="315" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">💾 Export</text>
  <text x="100" y="335" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Chat History JSON</text>

  <!-- Interfaces label -->
  <rect x="215" y="290" width="140" height="60" rx="10" fill="#1e293b" stroke="#533483" stroke-width="2"/>
  <text x="285" y="312" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🖥️ Interfaces</text>
  <text x="285" y="330" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">CLI (Click) | Web (Streamlit)</text>
  <text x="285" y="343" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Config (YAML)</text>

  <!-- Footer -->
  <text x="400" y="385" text-anchor="middle" fill="#4a5568" font-family="Segoe UI,Arial,sans-serif" font-size="11">PDF Chat Assistant — Local AI Architecture • No data leaves your machine</text>
</svg>
